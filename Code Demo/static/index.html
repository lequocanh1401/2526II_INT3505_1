<button onclick="load()">Xem</button>
<button onclick="add()">Thêm</button>

<script>
    const url = '/api/books';

    function load() {
        fetch(url).then(r => r.json()).then(d => alert(JSON.stringify(d)));
    }

    function add() {
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: "Sách mới" })
        }).then(() => load());
    }
</script>
