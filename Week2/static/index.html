<!DOCTYPE html>
<html>

<body>
    <h2>Bổ sung Cacheable (Ver 4)</h2>
    <button onclick="callAPI('GET')">Xem sách</button>
    <button onclick="callAPI('POST')">Thêm sách</button>

    <script>
        const url = '/api/books';
        const myHeaders = {
            'Content-Type': 'application/json',
            'Authorization': 'UET-SECRET-KEY'
        };

        function callAPI(method) {
            const options = { method: method, headers: myHeaders };
            if (method === 'POST') options.body = JSON.stringify({ title: "Sách mới V4" });

            fetch(url, options)
                .then(r => r.json())
                .then(d => alert(JSON.stringify(d, null, 2)))
                .catch(e => alert("Lỗi: " + e));
        }
    </script>
</body>

</html>
